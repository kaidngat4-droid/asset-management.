<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأصول - مع الاهلاك</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Tahoma;margin:0;background:#f4f6f9;}
.container{width:95%;max-width:1200px;margin:30px auto;background:white;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.08);}
.section-title{font-size:20px;font-weight:bold;color:#0d6efd;border-right:5px solid #0d6efd;padding-right:10px;margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:8px 0 15px;border-radius:8px;border:1px solid #ccc;}
button{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.save-btn{background:#198754;color:white;}
.delete-btn{background:#dc3545;color:white;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #dee2e6;padding:10px;text-align:center;}
th{background:#0d6efd;color:white;}
tr:nth-child(even){background:#f8f9fa;}
#totalValue{text-align:right;font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div class="section-title">➕ إضافة أصل جديد</div>

<input type="text" id="assetId" readonly>
<input type="text" id="itemName" placeholder="اسم الصنف">
<input type="number" id="value" placeholder="قيمة الأصل">
<input type="number" id="assetLife" placeholder="عمر الأصل (بالسنوات)">
<input type="date" id="entryDate">
<button class="save-btn" onclick="addItem()">حفظ الأصل</button>

<hr>

<div class="section-title">📋 سجل الأصول</div>

<table>
<thead>
<tr>
<th>رقم الأصل</th>
<th>الصنف</th>
<th>الإجمالي</th>
<th>القيمة</th>
<th>عمر الأصل</th>
<th>الاهلاك السنوي</th>
<th>نسبة الاهلاك %</th>
<th>التاريخ</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>

<div id="totalValue">إجمالي القيمة: 0</div>

<br>
<button class="save-btn" onclick="exportToExcel()">📥 تصدير Excel</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<script>

let db;
let lastAssetNumber=0;

const request=indexedDB.open("AssetDatabase",2);

request.onupgradeneeded=e=>{
    db=e.target.result;
    if(!db.objectStoreNames.contains("assets"))
        db.createObjectStore("assets",{keyPath:"assetId"});
};

request.onsuccess=e=>{
    db=e.target.result;
    renderTable();
    setNextAssetId();
};

function setNextAssetId(){
    assetId.value='AS-'+(lastAssetNumber+1).toString().padStart(4,'0');
}

function addItem(){

    const valueNum=parseFloat(value.value)||0;
    const life=parseFloat(assetLife.value)||0;

    if(!itemName.value || !valueNum || !life){
        alert("أدخل جميع البيانات");
        return;
    }

    lastAssetNumber++;

    const annualDepreciation=valueNum/life;
    const depreciationRate=(annualDepreciation/valueNum)*100;
    const total=valueNum;

    const newItem={
        assetId:'AS-'+lastAssetNumber.toString().padStart(4,'0'),
        itemName:itemName.value,
        value:valueNum,
        total:total,
        assetLife:life,
        annualDepreciation:annualDepreciation,
        depreciationRate:depreciationRate,
        entryDate:entryDate.value
    };

    const tx=db.transaction("assets","readwrite");
    tx.objectStore("assets").put(newItem);

    tx.oncomplete=()=>{
        renderTable();
        setNextAssetId();
        clearForm();
    };
}

function renderTable(){

    inventoryTable.innerHTML="";
    let totalAll=0;

    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");

    store.openCursor().onsuccess=e=>{
        const cursor=e.target.result;
        if(cursor){

            const item=cursor.value;
            totalAll+=item.value;

            inventoryTable.innerHTML+=`
            <tr>
            <td>${item.assetId}</td>
            <td>${item.itemName}</td>
            <td>${item.total.toLocaleString()}</td>
            <td>${item.value.toLocaleString()}</td>
            <td>${item.assetLife}</td>
            <td>${item.annualDepreciation.toLocaleString()}</td>
            <td>${item.depreciationRate.toFixed(2)}%</td>
            <td>${item.entryDate||'-'}</td>
            <td><button class="delete-btn" onclick="deleteItem('${item.assetId}')">❌</button></td>
            </tr>`;

            cursor.continue();
        }

        totalValue.innerText="إجمالي القيمة: "+totalAll.toLocaleString();
    };
}

function deleteItem(id){
    const tx=db.transaction("assets","readwrite");
    tx.objectStore("assets").delete(id);
    tx.oncomplete=()=>renderTable();
}

function clearForm(){
    itemName.value="";
    value.value="";
    assetLife.value="";
    entryDate.value="";
}

async function exportToExcel(){

    const workbook=new ExcelJS.Workbook();
    const sheet=workbook.addWorksheet("تقرير الأصول");

    sheet.addRow([
        "رقم الأصل","الصنف","الإجمالي","القيمة",
        "عمر الأصل","الاهلاك السنوي","نسبة الاهلاك %","التاريخ"
    ]);

    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");

    const rows=[];

    await new Promise(resolve=>{
        store.openCursor().onsuccess=e=>{
            const cursor=e.target.result;
            if(cursor){ rows.push(cursor.value); cursor.continue(); }
            else resolve();
        };
    });

    rows.forEach(item=>{
        sheet.addRow([
            item.assetId,
            item.itemName,
            item.total,
            item.value,
            item.assetLife,
            item.annualDepreciation,
            item.depreciationRate.toFixed(2)+"%",
            item.entryDate
        ]);
    });

    const buffer=await workbook.xlsx.writeBuffer();
    const blob=new Blob([buffer],{
        type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    });

    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="تقرير_الاهلاك.xlsx";
    link.click();
}

</script>

</body>
</html>
