<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأصول | المعهد الوطني للعلوم الإدارية</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:"Tahoma", Arial, sans-serif;margin:0;background:#f4f6f9;}
#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0d6efd,#001f4d);}
.login-box{background:white;padding:40px 30px;width:90%;max-width:420px;border-radius:20px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.35);}
.login-box img{width:95px;height:95px;object-fit:contain;background:white;padding:15px;border-radius:50%;border:3px solid #d4af37;margin-bottom:15px;}
.official-state{font-size:15px;color:#0d6efd;line-height:1.4;margin-bottom:10px;}
.institute-highlight{font-weight:bold;color:#d4af37;font-size:16px;}
.institute-highlight .branch{display:block;color:#198754;font-size:15px;}
.system-title{font-family:'Aref Ruqaa', serif;font-size:26px;font-weight:700;color:#0d6efd;margin-bottom:15px;}
.login-box input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc;}
.login-box button{width:100%;padding:12px;background:linear-gradient(135deg,#0d6efd,#084298);border:none;color:white;font-weight:bold;border-radius:10px;cursor:pointer;}
#errorMsg{color:#dc3545;margin-top:10px;font-weight:bold;}
.main-header{background:linear-gradient(135deg,#0d6efd,#001f4d);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:15px;}
.logo{ width:60px; } .logo-institute{ width:80px; }
.main-header span{font-family:'Aref Ruqaa', serif;font-weight:bold;font-size:20px;text-align:center;flex:1;}
.logout-btn{background:#dc3545;padding:8px 14px;border:none;color:white;border-radius:8px;cursor:pointer;font-weight:bold;}
.container{width:95%;max-width:1200px;margin:30px auto;background:white;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.08);}
.section-title{font-size:20px;font-weight:bold;color:#0d6efd;border-right:5px solid #0d6efd;padding-right:10px;margin-bottom:20px;}
input, select, textarea{width:100%;padding:10px;margin:8px 0 15px;border-radius:8px;border:1px solid #ccc;}
.save-btn{background:linear-gradient(135deg,#198754,#0f5132);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:bold;}
.delete-btn{background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:bold;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th, td{border:1px solid #dee2e6;padding:10px;text-align:center;}
th{background:#0d6efd;color:white;}
tr:nth-child(even){background:#f8f9fa;}
table img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
#totalValue{text-align:right;font-weight:bold;margin-top:10px;font-size:16px;}
</style>
</head>
<body>

<!-- صفحة تسجيل الدخول -->
<div id="loginPage">
    <div class="login-box">
        <img src="assets/logo.png" alt="شعار المعهد">
        <div class="official-state">
            الجمهورية اليمنية<br>
            <span class="institute-highlight">
            المعهد الوطني للعلوم الإدارية
            <span class="branch">فرع إب</span>
            </span>
        </div>
        <div class="system-title">🏛️ الجرد الإلكتروني لإدارة الأصول</div>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل الدخول</button>
        <div id="errorMsg"></div>
    </div>
</div>

<!-- الصفحة الرئيسية -->
<div id="appPage" style="display:none;">
<header class="main-header">
    <div class="header-left">
        <img src="assets/logo.png" class="logo" alt="شعار المعهد">
        <img src="assets/logo-institute.png" class="logo-institute" alt="شعار المعهد">
    </div>
    <span>إدارة أصول المعهد الوطني للعلوم الإدارية فرع إب</span>
    <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">
<div class="section-title">➕ إضافة أصل جديد</div>
<input type="text" id="assetId" placeholder="رقم الأصل" readonly>
<input type="text" id="itemName" placeholder="اسم الصنف">
<input type="number" id="quantity" placeholder="العدد" min="1" value="1">
<input type="number" id="value" placeholder="القيمة التقديرية">
<input type="date" id="entryDate">
<input type="number" id="depreciation" placeholder="نسبة الاهلاك %" value="0" min="0" max="100">
<input type="file" id="imageInput" accept="image/*">
<button class="save-btn" onclick="addItem()">حفظ الأصل</button>
<hr>

<div class="section-title">📋 سجل الأصول</div>
<input type="text" id="searchInput" placeholder="بحث..." onkeyup="searchTable()">
<table>
<thead>
<tr>
<th>رقم الأصل</th>
<th>الصنف</th>
<th>العدد</th>
<th>القيمة</th>
<th>نسبة الاهلاك %</th>
<th>العمر (سنة)</th>
<th>القيمة بعد الاهلاك</th>
<th>التاريخ</th>
<th>الصورة</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
<div id="totalValue">إجمالي القيمة بعد الاهلاك: 0 ريال يمني</div>
<hr>

<div style="text-align:center; margin-top:20px;">
<button class="save-btn" onclick="exportToExcel()">📥 تنزيل Excel</button>
<button class="save-btn" onclick="window.print()">🖨 طباعة</button>
<button class="save-btn" onclick="exportToJSON()">💾 نسخة احتياطية</button>
<button class="delete-btn" onclick="clearAllData()">🗑 مسح جميع البيانات</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script>
//////////////////////////
// IndexedDB
//////////////////////////
let db, lastAssetNumber = 0;
let userRole = "admin"; // مؤقت

const request = indexedDB.open("AssetDatabase", 4);

request.onupgradeneeded = e=>{
    db = e.target.result;
    if(!db.objectStoreNames.contains("assets")) db.createObjectStore("assets",{keyPath:"assetId"});
    if(!db.objectStoreNames.contains("settings")) db.createObjectStore("settings",{keyPath:"key"});
};

request.onsuccess = e=>{
    db = e.target.result;
    loadLastAssetNumber();
    renderTable();
};

request.onerror = e=>{
    alert("فشل في فتح قاعدة البيانات");
};

// إدارة رقم الأصل
function loadLastAssetNumber(){
    const tx = db.transaction("settings","readonly");
    const store = tx.objectStore("settings");
    const req = store.get("lastAssetNumber");
    req.onsuccess = ()=>{
        lastAssetNumber = req.result ? req.result.value : 0;
        setNextAssetId();
    };
}

function saveLastAssetNumber(){
    const tx = db.transaction("settings","readwrite");
    tx.objectStore("settings").put({key:"lastAssetNumber",value:lastAssetNumber});
}

function setNextAssetId(){
    document.getElementById("assetId").value = 'AS-'+(lastAssetNumber+1).toString().padStart(4,'0');
}

// صلاحية المدير
function isAdmin(){ return userRole==="admin"; }

//////////////////////////
// إضافة أصل
//////////////////////////
function addItem(){
    if(!itemName.value.trim()){ alert("أدخل اسم الصنف"); return; }
    const file=imageInput.files[0]; if(!file){ alert("أضف صورة"); return; }

    lastAssetNumber++;
    const newAssetId='AS-'+lastAssetNumber.toString().padStart(4,'0');
    const qty=parseInt(quantity.value)||1;
    const val=parseFloat(value.value)||0;
    const dep=parseFloat(depreciation.value)||0;
    const entry=entryDate.value? new Date(entryDate.value): null;
    const age = entry ? new Date().getFullYear()-entry.getFullYear():0;
    const finalValue = ((val*qty)*(1-dep/100)).toFixed(2);

    const reader=new FileReader();
    reader.onload=e=>{
        const newItem={
            assetId:newAssetId,
            itemName:itemName.value.trim(),
            quantity:qty,
            value:val,
            depreciation:dep,
            age:age,
            finalValue:parseFloat(finalValue),
            entryDate:entryDate.value||'',
            image:e.target.result
        };
        const tx=db.transaction("assets","readwrite");
        tx.objectStore("assets").put(newItem);
        tx.oncomplete=()=>{
            saveLastAssetNumber();
            renderTable();
            clearForm();
            setNextAssetId();
        };
    };
    reader.readAsDataURL(file);
}
  
function clearForm(){
    itemName.value=''; quantity.value='1'; value.value=''; depreciation.value='0'; entryDate.value=''; imageInput.value='';
}

//////////////////////////
// عرض البيانات
//////////////////////////
function renderTable(){
    inventoryTable.innerHTML='';
    let total=0;
    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");
    store.openCursor().onsuccess=e=>{
        const cursor=e.target.result;
        if(cursor){
            const item=cursor.value;
            inventoryTable.innerHTML+=`
            <tr>
                <td>${item.assetId}</td>
                <td>${item.itemName}</td>
                <td>${item.quantity}</td>
                <td>${item.value.toLocaleString()}</td>
                <td>${item.depreciation}</td>
                <td>${item.age}</td>
                <td>${item.finalValue.toLocaleString()}</td>
                <td>${item.entryDate||'-'}</td>
                <td><img src="${item.image}" width="60"></td>
                <td><button class="delete-btn" onclick="deleteItem('${item.assetId}')">❌</button></td>
            </tr>`;
            total+=item.finalValue;
            cursor.continue();
        } else { totalValue.innerText='إجمالي القيمة بعد الاهلاك: '+total.toLocaleString()+' ريال يمني'; }
    };
}

function deleteItem(id){
    if(confirm("هل تريد الحذف؟")){
        const tx=db.transaction("assets","readwrite");
        tx.objectStore("assets").delete(id);
        tx.oncomplete=()=>{ renderTable(); };
    }
}

//////////////////////////
// البحث
//////////////////////////
function searchTable(){
    const val=searchInput.value.toLowerCase().trim();
    inventoryTable.innerHTML='';
    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");
    store.openCursor().onsuccess=e=>{
        const cursor=e.target.result;
        if(cursor){
            const item=cursor.value;
            if(item.assetId.toLowerCase().includes(val) || item.itemName.toLowerCase().includes(val)){
                inventoryTable.innerHTML+=`
                <tr>
                    <td>${item.assetId}</td>
                    <td>${item.itemName}</td>
                    <td>${item.quantity}</td>
                    <td>${item.value.toLocaleString()}</td>
                    <td>${item.depreciation}</td>
                    <td>${item.age}</td>
                    <td>${item.finalValue.toLocaleString()}</td>
                    <td>${item.entryDate||'-'}</td>
                    <td><img src="${item.image}" width="60"></td>
                    <td></td>
                </tr>`;
            }
            cursor.continue();
        }
    };
}

//////////////////////////
// تنزيل Excel احترافي
//////////////////////////
async function exportToExcel(){
    const workbook=new ExcelJS.Workbook();
    const ws=workbook.addWorksheet("تقرير الأصول");
    // عناوين
    ws.mergeCells('A1:H2');
    ws.getCell('A1').value="تقرير الجرد الإلكتروني - المعهد الوطني للعلوم الإدارية فرع إب";
    ws.getCell('A1').alignment={horizontal:'center',vertical:'middle'};
    ws.getCell('A1').font={size:16,bold:true,color:{argb:'FF0D6EFD'}};
    
    ws.addRow([]);
    const header = ["رقم الأصل","الصنف","العدد","القيمة","نسبة الاهلاك %","العمر (سنة)","القيمة بعد الاهلاك","التاريخ","الصورة"];
    ws.addRow(header).eachCell(c=>{c.font={bold:true}; c.alignment={horizontal:'center'}; c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFD966'}};});

    const tx=db.transaction("assets","readonly"); 
    const store=tx.objectStore("assets");
    const items=[];
    await new Promise(resolve=>{
        store.openCursor().onsuccess=e=>{
            const cursor=e.target.result;
            if(cursor){ items.push(cursor.value); cursor.continue(); } else { resolve(); }
        };
    });

    for(const item of items){
        const row=ws.addRow([item.assetId,item.itemName,item.quantity,item.value,item.depreciation,item.age,item.finalValue,item.entryDate,""]);
        row.height=65;
        if(item.image){
            const imgId=workbook.addImage({base64:item.image,extension:'png'});
            ws.addImage(imgId,{tl:{col:8,row:row.number-1},ext:{width:60,height:60}});
        }
        row.eachCell(c=>{c.alignment={horizontal:'center',vertical:'middle'};});
    }
    ws.columns=[{width:15},{width:20},{width:10},{width:12},{width:15},{width:10},{width:18},{width:15},{width:20}];
    const buf=await workbook.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="تقرير_الجرد.xlsx";
    link.click();
}

//////////////////////////
// النسخة الاحتياطية
//////////////////////////
function exportToJSON(){
    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");
    const items=[];
    store.openCursor().onsuccess=e=>{
        const cursor=e.target.result;
        if(cursor){ items.push(cursor.value); cursor.continue(); }
        else{
            const link=document.createElement("a");
            link.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(items,null,2));
            link.download="inventory_backup.json"; link.click();
        }
    };
                
   //////////////////////////
// مسح البيانات
//////////////////////////
function clearAllData(){
    if(confirm("هل أنت متأكد؟")){
        const tx=db.transaction("assets","readwrite"); tx.objectStore("assets").clear();
        tx.oncomplete=()=>{
            lastAssetNumber=0; saveLastAssetNumber(); renderTable(); setNextAssetId();
        };
    }
}

//////////////////////////
// تسجيل الدخول والخروج
//////////////////////////
function login(){
    if(username.value==="admin" && password.value==="1234"){
        localStorage.setItem("loggedIn","true");
        localStorage.setItem("userRole","admin");
        loginPage.style.display="none";
        appPage.style.display="block";
    } else { errorMsg.innerText="بيانات غير صحيحة"; }
}

function logout(){
    localStorage.removeItem("loggedIn"); localStorage.removeItem("userRole");
    location.reload();
}

// تفعيل الدخول التلقائي
window.addEventListener('load',()=>{
    if(localStorage.getItem("loggedIn")==="true"){
        loginPage.style.display="none";
        appPage.style.display="block";
    }
});
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
  .then(() => console.log("Service Worker Registered"));
}
</script
</body>
</html>
