<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأصول | المعهد الوطني للعلوم الإدارية</title>

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:"Tahoma",Arial;margin:0;background:#f4f6f9;}
.main-header{background:linear-gradient(135deg,#0d6efd,#001f4d);color:white;padding:15px 20px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:15px;}
.logo{width:60px;}
.logo-institute{width:80px;}
.main-header span{font-family:'Aref Ruqaa',serif;font-size:20px;font-weight:bold;text-align:center;flex:1;}
.container{width:95%;max-width:1300px;margin:25px auto;background:white;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.08);}
.section-title{font-size:20px;font-weight:bold;color:#0d6efd;border-right:5px solid #0d6efd;padding-right:10px;margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:8px 0 15px;border-radius:8px;border:1px solid #ccc;}
.save-btn{background:linear-gradient(135deg,#198754,#0f5132);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:bold;}
.delete-btn{background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:20px;font-size:13px;}
th,td{border:1px solid #dee2e6;padding:8px;text-align:center;}
th{background:#0d6efd;color:white;}
tr:nth-child(even){background:#f8f9fa;}
table img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
#totalValue{text-align:right;font-weight:bold;margin-top:10px;}
</style>
</head>
<body>

<header class="main-header">
<div class="header-left">
<img src="assets/logo.png" class="logo">
<img src="assets/logo-institute.png" class="logo-institute">
</div>
<span>إدارة أصول المعهد الوطني للعلوم الإدارية فرع إب</span>
</header>

<div class="container">

<div class="section-title">➕ إضافة أصل جديد</div>

<input type="text" id="assetId" placeholder="رقم الأصل" readonly>
<input type="text" id="itemName" placeholder="اسم الصنف">
<input type="number" id="quantity" placeholder="العدد" value="1">
<input type="number" id="assetLife" placeholder="عمر الأصل (بالسنوات)">
<input type="number" id="value" placeholder="القيمة التقديرية">
<input type="text" id="category" placeholder="الفئة">
<input type="text" id="department" placeholder="القسم">
<input type="date" id="entryDate">
<select id="condition">
<option value="">الحالة</option>
<option>جيد</option>
<option>يحتاج صيانة</option>
<option>تالف</option>
</select>
<input type="file" id="imageInput" accept="image/*">
<button class="save-btn" onclick="addItem()">حفظ الأصل</button>

<hr>

<div class="section-title">📋 سجل الأصول</div>

<table>
<thead>
<tr>
<th>رقم الأصل</th>
<th>الصنف</th>
<th>العدد</th>
<th>العمر</th>
<th>نسبة الإهلاك</th>
<th>الإهلاك السنوي</th>
<th>القيمة</th>
<th>الفئة</th>
<th>القسم</th>
<th>التاريخ</th>
<th>الحالة</th>
<th>الصورة</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>

<div id="totalValue">إجمالي القيمة: 0 ريال يمني</div>

<div style="text-align:center;margin-top:20px;">
<button class="save-btn" onclick="exportToExcel()">📥 تنزيل Excel</button>
<button class="save-btn" onclick="window.print()">🖨 طباعة</button>
<button class="save-btn" onclick="exportToJSON()">💾 نسخة احتياطية</button>
<button class="delete-btn" onclick="clearAllData()">🗑 مسح جميع البيانات</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<script>
let db,lastAssetNumber=0;

const request=indexedDB.open("AssetDatabase",3);

request.onupgradeneeded=e=>{
db=e.target.result;
if(!db.objectStoreNames.contains("assets"))
db.createObjectStore("assets",{keyPath:"assetId"});
if(!db.objectStoreNames.contains("settings"))
db.createObjectStore("settings",{keyPath:"key"});
};

request.onsuccess=e=>{db=e.target.result;loadLastNumber();renderTable();};

function loadLastNumber(){
const tx=db.transaction("settings","readonly");
const store=tx.objectStore("settings");
const req=store.get("lastNumber");
req.onsuccess=()=>{lastAssetNumber=req.result?req.result.value:0;setNextAssetId();};
}

function saveLastNumber(){
const tx=db.transaction("settings","readwrite");
tx.objectStore("settings").put({key:"lastNumber",value:lastAssetNumber});
}

function setNextAssetId(){
assetId.value='AS-'+(lastAssetNumber+1).toString().padStart(4,'0');
}

function addItem(){
const file=imageInput.files[0];
if(!file){alert("أضف صورة");return;}

const reader=new FileReader();
reader.onload=e=>{
lastAssetNumber++;

const val=parseFloat(value.value)||0;
const life=parseFloat(assetLife.value)||0;

const annualDep=life>0?(val/life):0;
const depRate=life>0?(100/life):0;

const newItem={
assetId:'AS-'+lastAssetNumber.toString().padStart(4,'0'),
itemName:itemName.value,
quantity:parseFloat(quantity.value)||1,
assetLife:life,
depreciationRate:depRate,
annualDepreciation:annualDep,
value:val,
category:category.value,
department:department.value,
entryDate:entryDate.value,
condition:condition.value,
image:e.target.result
};

const tx=db.transaction("assets","readwrite");
tx.objectStore("assets").put(newItem);

tx.oncomplete=()=>{
saveLastNumber();
renderTable();
clearForm();
setNextAssetId();
};
};
reader.readAsDataURL(file);
}

function clearForm(){
itemName.value="";
quantity.value="1";
assetLife.value="";
value.value="";
category.value="";
department.value="";
entryDate.value="";
condition.value="";
imageInput.value="";
}

function renderTable(){
inventoryTable.innerHTML="";
let total=0;
const tx=db.transaction("assets","readonly");
const store=tx.objectStore("assets");

store.openCursor().onsuccess=e=>{
const cursor=e.target.result;
if(cursor){
const item=cursor.value;

inventoryTable.innerHTML+=`
<tr>
<td>${item.assetId}</td>
<td>${item.itemName}</td>
<td>${item.quantity||1}</td>
<td>${item.assetLife||0}</td>
<td>${(item.depreciationRate||0).toFixed(2)}%</td>
<td>${(item.annualDepreciation||0).toLocaleString()}</td>
<td>${(item.value||0).toLocaleString()}</td>
<td>${item.category||'-'}</td>
<td>${item.department||'-'}</td>
<td>${item.entryDate||'-'}</td>
<td>${item.condition||'-'}</td>
<td><img src="${item.image}" width="60"></td>
<td><button class="delete-btn" onclick="deleteItem('${item.assetId}')">❌</button></td>
</tr>`;

total+=item.value||0;
cursor.continue();
}
totalValue.innerText="إجمالي القيمة: "+total.toLocaleString()+" ريال يمني";
};
}

function deleteItem(id){
if(confirm("هل تريد الحذف؟")){
const tx=db.transaction("assets","readwrite");
tx.objectStore("assets").delete(id);
tx.oncomplete=()=>{renderTable();};
}
}

function clearAllData(){
if(confirm("هل أنت متأكد؟")){
const tx=db.transaction("assets","readwrite");
tx.objectStore("assets").clear();
tx.oncomplete=()=>{lastAssetNumber=0;saveLastNumber();renderTable();};
}
}

function exportToJSON(){
const tx=db.transaction("assets","readonly");
const store=tx.objectStore("assets");
const items=[];
store.openCursor().onsuccess=e=>{
const cursor=e.target.result;
if(cursor){items.push(cursor.value);cursor.continue();}
else{
const link=document.createElement("a");
link.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(items,null,2));
link.download="inventory_backup.json";
link.click();
}
};
}

async function exportToExcel(){
const workbook=new ExcelJS.Workbook();
const worksheet=workbook.addWorksheet("تقرير الأصول");

worksheet.addRow(["رقم الأصل","الصنف","العدد","العمر","نسبة الإهلاك","الإهلاك السنوي","القيمة","الفئة","القسم","التاريخ","الحالة"]);

const tx=db.transaction("assets","readonly");
const store=tx.objectStore("assets");
const rows=[];

await new Promise(resolve=>{
store.openCursor().onsuccess=e=>{
const cursor=e.target.result;
if(cursor){rows.push(cursor.value);cursor.continue();}
else resolve();
};
});

rows.forEach(item=>{
worksheet.addRow([
item.assetId,
item.itemName,
item.quantity||1,
item.assetLife||0,
(item.depreciationRate||0).toFixed(2)+"%",
item.annualDepreciation||0,
item.value||0,
item.category,
item.department,
item.entryDate,
item.condition
]);
});

const buffer=await workbook.xlsx.writeBuffer();
const blob=new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="تقرير_الجرد.xlsx";
link.click();
}
</script>
</body>
</html>
