<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأصول | المعهد الوطني للعلوم الإدارية</title>
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:"Tahoma", Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

/* شاشة الدخول */
#loginPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#001f4d);
}
.login-box{
    background:white;
    padding:40px 30px;
    width:90%;
    max-width:420px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
.login-box img{
    width:95px;
    height:95px;
    object-fit:contain;
    background:white;
    padding:15px;
    border-radius:50%;
    border:3px solid #d4af37;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    margin-bottom:15px;
}
.official-state{
    font-size:15px;
    color:#0d6efd;
    line-height:1.4;
    margin-bottom:10px;
}
.institute-highlight{
    font-weight:bold;
    color:#d4af37;
    font-size:16px;
}
.institute-highlight .branch{

}

.system-title{

}

.login-box input{

    border-radius:10px;
    border:1px solid #ccc;
}
.login-box button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#0d6efd,#084298);
    border:none;
    color:white;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
}
#errorMsg{
    color:#dc3545;
    margin-top:10px;
    font-weight:bold;
}
/* الهيدر */
.main-header{
    background:linear-gradient(135deg,#0d6efd,#001f4d);
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}
.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}
.logo{ width:60px; }
.logo-institute{ width:80px; }

.main-header span{
    font-family:'Aref Ruqaa', serif;
    font-weight:bold;
    font-size:20px;
    text-align:center;
    flex:1;
}

.logout-btn{
    background:#dc3545;
    padding:8px 14px;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:1200px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.section-title{
    font-size:20px;
    font-weight:bold;
    color:#0d6efd;
    border-right:5px solid #0d6efd;
    padding-right:10px;
    margin-bottom:20px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border-radius:8px;
    border:1px solid #ccc;
}

.save-btn{
    background:linear-gradient(135deg,#198754,#0f5132);
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.delete-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th, td{
    border:1px solid #dee2e6;
    padding:10px;
    text-align:center;
}
th{
    background:#0d6efd;
    color:white;
}
tr:nth-child(even){
    background:#f8f9fa;
}
table img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

#totalValue{
    text-align:right;
    font-weight:bold;
    margin-top:10px;
    font-size:16px;
}
</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="loginPage">
    <div class="login-box">
        <img src="assets/logo.png">
        <div class="official-state">
            الجمهورية اليمنية<br>
            <span class="institute-highlight">
            المعهد الوطني للعلوم الإدارية
            <span class="branch">فرع إب</span>
            </span>
        </div>
        <div class="system-title">🏛️ الجرد الإلكتروني لإدارة الأصول</div>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل الدخول</button>
        <div id="errorMsg"></div>
    </div>
</div>

<!-- النظام -->
<div id="appPage" style="display:none;">

<header class="main-header">
    <div class="header-left">
        <img src="assets/logo.png" class="logo">
        <img src="assets/logo-institute.png" class="logo-institute">
    </div>
    <span>إدارة أصول المعهد الوطني للعلوم الإدارية فرع إب</span>
    <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">

<div class="section-title">➕ إضافة أصل جديد</div>

<input type="text" id="assetId" placeholder="رقم الأصل" readonly>
<input type="text" id="itemName" placeholder="اسم الصنف">
<input type="text" id="category" placeholder="الفئة">
<input type="text" id="department" placeholder="القسم">
<input type="text" id="location" placeholder="الموقع">
<input type="number" id="value" placeholder="القيمة التقديرية">
<input type="date" id="entryDate">
<select id="condition">
<option value="">الحالة</option>
<option>جيد</option>
<option>يحتاج صيانة</option>
<option>تالف</option>
</select>
<input type="file" id="imageInput" accept="image/*">
<button class="save-btn" onclick="addItem()">حفظ الأصل</button>

<hr>

<div class="section-title">📋 سجل الأصول</div>

<input type="text" id="searchInput" placeholder="بحث..." onkeyup="searchTable()">
<table>
<thead>
<tr>
<th>رقم الأصل</th>
<th>الصنف</th>
<th>الفئة</th>
<th>القسم</th>
<th>الموقع</th>
<th>القيمة</th>
<th>التاريخ</th>
<th>الحالة</th>
<th>الصورة</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>

<div id="totalValue">إجمالي القيمة: 0 ريال يمني</div>

<hr>

<div style="text-align:center; margin-top:20px;">
<button class="save-btn" onclick="exportToExcel()">📥 تنزيل Excel</button>
<button class="save-btn" onclick="window.print()">🖨 طباعة</button>
<button class="save-btn" onclick="exportToJSON()">💾 نسخة احتياطية</button>
<button class="delete-btn" onclick="clearAllData()">🗑 مسح جميع البيانات</button>
</div>

</div>
</div>

<!-- مكتبة ExcelJS -->
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<script>
let inventory = JSON.parse(localStorage.getItem("inventoryData")) || [];
let lastAssetNumber = parseInt(localStorage.getItem("lastAssetNumber")) || 0;

function login(){
    if(username.value==="admin" && password.value==="1234"){
        localStorage.setItem("loggedIn","true");
        loginPage.style.display="none";
        appPage.style.display="block";
        setNextAssetId();
        renderTable();
    } else {
        errorMsg.innerText="بيانات غير صحيحة";
    }
}

function logout(){
    localStorage.removeItem("loggedIn");
    location.reload();
}

if(localStorage.getItem("loggedIn")==="true"){
    loginPage.style.display="none";
    appPage.style.display="block";
    setNextAssetId();
    renderTable();
}

function saveData(){
    localStorage.setItem("inventoryData", JSON.stringify(inventory));
    localStorage.setItem("lastAssetNumber", lastAssetNumber);
}

function setNextAssetId(){
    lastAssetNumber++;
    assetId.value='AS-'+lastAssetNumber.toString().padStart(4,'0');
}

function addItem(){
    const file=imageInput.files[0];
    if(!file){alert("أضف صورة");return;}

    const reader=new FileReader();
    reader.onload=function(e){
        inventory.push({
            assetId:assetId.value,
            itemName:itemName.value,
            category:category.value,
            department:department.value,
            location:location.value,
            value:parseFloat(value.value)||0,
            entryDate:entryDate.value,
            condition:condition.value,
            image:e.target.result
        });
        saveData();
        renderTable();
        setNextAssetId();
    };
    reader.readAsDataURL(file);
}

function deleteItem(i){
    inventory.splice(i,1);
    saveData();
    renderTable();
}

function renderTable(){
    inventoryTable.innerHTML='';
    let total=0;

    inventory.forEach((item,i)=>{
        inventoryTable.innerHTML+=`
        <tr>
        <td>${item.assetId}</td>
        <td>${item.itemName}</td>
        <td>${item.category||'-'}</td>
        <td>${item.department||'-'}</td>
        <td>${item.location||'-'}</td>
        <td>${item.value.toLocaleString()}</td>
        <td>${item.entryDate||'-'}</td>
        <td>${item.condition||'-'}</td>
        <td><img src="${item.image}" width="60"></td>
        <td><button class="delete-btn" onclick="deleteItem(${i})">❌</button></td>
        </tr>`;
        total+=item.value;
    });

    totalValue.innerText='إجمالي القيمة: '+total.toLocaleString()+' ريال يمني';
}

function searchTable(){
    const val=searchInput.value.toLowerCase();
    const filtered=inventory.filter(item=>
        item.assetId.toLowerCase().includes(val) ||
        item.itemName.toLowerCase().includes(val)
    );

    inventoryTable.innerHTML='';
    filtered.forEach(item=>{
        inventoryTable.innerHTML+=`
        <tr>
        <td>${item.assetId}</td>
        <td>${item.itemName}</td>
        <td>${item.category}</td>
        <td>${item.department}</td>
        <td>${item.location}</td>
        <td>${item.value.toLocaleString()}</td>
        <td>${item.entryDate}</td>
        <td>${item.condition}</td>
        <td><img src="${item.image}" width="60"></td>
        <td></td>
        </tr>`;
    });
}

<!-- ================== تصدير Excel احترافي ================== -->

        alert("لا توجد بيانات للتصدير");
        return;

<script>

//////////////////////////////
// تسجيل الدخول (يبقى كما هو)
//////////////////////////////

function login(){
    if(username.value==="admin" && password.value==="1234"){
        localStorage.setItem("loggedIn","true");
        loginPage.style.display="none";
        appPage.style.display="block";
        renderTable();
    } else {
        errorMsg.innerText="بيانات غير صحيحة";
    }
}

function logout(){
    localStorage.removeItem("loggedIn");
    location.reload();
}

if(localStorage.getItem("loggedIn")==="true"){
    loginPage.style.display="none";
    appPage.style.display="block";
}

//////////////////////////////
// إعداد IndexedDB
//////////////////////////////

let db;
let lastAssetNumber = 0;

const request = indexedDB.open("AssetDatabase", 1);

request.onupgradeneeded = function(e){
    db = e.target.result;

    if(!db.objectStoreNames.contains("assets")){
        db.createObjectStore("assets",{ keyPath:"assetId" });
    }

    if(!db.objectStoreNames.contains("settings")){
        db.createObjectStore("settings",{ keyPath:"key" });
    }
};

request.onsuccess = function(e){
    db = e.target.result;
    loadLastNumber();
    renderTable();
};

request.onerror = function(){
    alert("فشل فتح قاعدة البيانات");
};

//////////////////////////////
// إدارة رقم الأصل
//////////////////////////////

function loadLastNumber(){
    const tx = db.transaction("settings","readonly");
    const store = tx.objectStore("settings");
    const req = store.get("lastNumber");

    req.onsuccess = function(){
        lastAssetNumber = req.result ? req.result.value : 0;
        setNextAssetId();
    };
}

function saveLastNumber(){
    const tx = db.transaction("settings","readwrite");
    tx.objectStore("settings").put({
        key:"lastNumber",
        value:lastAssetNumber
    });
}

function setNextAssetId(){
    assetId.value = 'AS-' + 
    (lastAssetNumber + 1).toString().padStart(4,'0');
}

//////////////////////////////
// إضافة أصل
//////////////////////////////

function addItem(){

    const file=imageInput.files[0];
    if(!file){
        alert("أضف صورة");
        return;
    }

    const reader=new FileReader();

    reader.onload=function(e){

        lastAssetNumber++;

        const newItem={
            assetId:'AS-'+lastAssetNumber.toString().padStart(4,'0'),
            itemName:itemName.value,
            category:category.value,
            department:department.value,
            location:location.value,
            value:parseFloat(value.value)||0,
            entryDate:entryDate.value,
            condition:condition.value,
            image:e.target.result
        };

        const tx=db.transaction("assets","readwrite");
        tx.objectStore("assets").put(newItem);

        tx.oncomplete=function(){
            saveLastNumber();
            renderTable();
            clearForm();
            setNextAssetId();
        };
    };

    reader.readAsDataURL(file);
}

//////////////////////////////
// مسح النموذج
//////////////////////////////

function clearForm(){
    itemName.value='';
    category.value='';
    department.value='';
    location.value='';
    value.value='';
    entryDate.value='';
    condition.value='';
    imageInput.value='';
}

//////////////////////////////
// عرض البيانات
//////////////////////////////

function renderTable(){

    inventoryTable.innerHTML='';
    let total=0;

    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");

    store.openCursor().onsuccess=function(e){

        const cursor=e.target.result;

        if(cursor){

            const item=cursor.value;

            inventoryTable.innerHTML+=`
            <tr>
                <td>${item.assetId}</td>
                <td>${item.itemName}</td>
                <td>${item.category||'-'}</td>
                <td>${item.department||'-'}</td>
                <td>${item.location||'-'}</td>
                <td>${item.value.toLocaleString()}</td>
                <td>${item.entryDate||'-'}</td>
                <td>${item.condition||'-'}</td>
                <td><img src="${item.image}" width="60"></td>
                <td>
                    <button class="delete-btn" onclick="deleteItem('${item.assetId}')">❌</button>
                </td>
            </tr>
            `;

            total+=item.value||0;

            cursor.continue();
        }

        totalValue.innerText=
        'إجمالي القيمة: '+total.toLocaleString()+' ريال يمني';
    };
}

//////////////////////////////
// حذف أصل
//////////////////////////////

function deleteItem(id){

    if(confirm("هل تريد حذف هذا الأصل؟")){

        const tx=db.transaction("assets","readwrite");
        tx.objectStore("assets").delete(id);

        tx.oncomplete=function(){
            renderTable();
        };
    }
}

//////////////////////////////
// البحث
//////////////////////////////

function searchTable(){

    const val=searchInput.value.toLowerCase();

    inventoryTable.innerHTML='';

    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");

    store.openCursor().onsuccess=function(e){

        const cursor=e.target.result;

        if(cursor){

            const item=cursor.value;

            if(
                item.assetId.toLowerCase().includes(val) ||
                item.itemName.toLowerCase().includes(val)
            ){
                inventoryTable.innerHTML+=`
                <tr>
                    <td>${item.assetId}</td>
                    <td>${item.itemName}</td>
                    <td>${item.category}</td>
                    <td>${item.department}</td>
                    <td>${item.location}</td>
                    <td>${item.value.toLocaleString()}</td>
                    <td>${item.entryDate}</td>
                    <td>${item.condition}</td>
                    <td><img src="${item.image}" width="60"></td>
                    <td></td>
                </tr>`;
            }

            cursor.continue();
        }
    };
}

//////////////////////////////
// تصدير Excel احترافي
//////////////////////////////

async function exportToExcel(){

    const workbook=new ExcelJS.Workbook();
    const worksheet=workbook.addWorksheet("تقرير الأصول");

    worksheet.mergeCells('A1:I2');
    worksheet.getCell('A1').value=
    "تقرير الجرد الإلكتروني - المعهد الوطني للعلوم الإدارية فرع إب";
    worksheet.getCell('A1').alignment={horizontal:'center',vertical:'middle'};
    worksheet.getCell('A1').font={size:16,bold:true};

    worksheet.addRow([]);

    const headerRow=worksheet.addRow([
        "رقم الأصل","الصنف","الفئة","القسم",
        "الموقع","القيمة","التاريخ","الحالة","الصورة"
    ]);

    headerRow.eachCell(cell=>{
        cell.font={bold:true};
        cell.alignment={horizontal:'center'};
    });

    const tx=db.transaction("assets","readonly");
    const store=tx.objectStore("assets");

    const rows=[];

    await new Promise(resolve=>{
        store.openCursor().onsuccess=function(e){
            const cursor=e.target.result;
            if(cursor){
                rows.push(cursor.value);
                cursor.continue();
            }else{
                resolve();
            }
        };
    });

    for(const item of rows){

        const row=worksheet.addRow([
            item.assetId,
            item.itemName,
            item.category,
            item.department,
            item.location,
            item.value,
            item.entryDate,
            item.condition,
            ""
        ]);

        row.height=65;

        if(item.image){
            const imageId=workbook.addImage({
                base64:item.image,
                extension:'png'
            });

            worksheet.addImage(imageId,{
                tl:{col:8,row:row.number-1},
                ext:{width:60,height:60}
            });
        }
    }

    const buffer=await workbook.xlsx.writeBuffer();
    const blob=new Blob([buffer],{
        type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    });

    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="تقرير_الجرد.xlsx";
    link.click();
}

//////////////////////////////
// مسح جميع البيانات
//////////////////////////////

function clearAllData(){

    if(confirm("هل أنت متأكد؟")){

        const tx=db.transaction("assets","readwrite");
        tx.objectStore("assets").clear();

        tx.oncomplete=function(){
            lastAssetNumber=0;
            saveLastNumber();
            renderTable();
        };
    }
}

</script>

</body>
